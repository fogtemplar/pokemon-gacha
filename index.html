<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokemon Card Gacha</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎴</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0b0d1a;
      --bg-card: #151830;
      --fire: #ff6b35;
      --water: #3b82f6;
      --grass: #22c55e;
      --gold: #fbbf24;
      --purple: #a855f7;
      --text: #e2e8f0;
      --text-dim: #64748b;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .app {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px;
      text-align: center;
      position: relative;
      min-height: 100vh;
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 2.4rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--gold), var(--fire), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .subtitle {
      color: var(--text-dim);
      font-size: 0.9rem;
      margin-bottom: 12px;
    }

    .data-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 0.7rem;
      margin-bottom: 40px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      color: var(--text-dim);
    }
    .data-badge .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--grass);
      animation: pulse 2s infinite;
    }
    .data-badge.offline .dot { background: var(--fire); animation: none; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* === PACK SELECT === */
    .pack-grid {
      display: flex;
      justify-content: center;
      gap: 24px;
      flex-wrap: wrap;
    }

    .pack {
      width: 200px;
      height: 300px;
      border-radius: 18px;
      cursor: pointer;
      position: relative;
      transition: transform 0.3s, box-shadow 0.3s;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .pack:hover {
      transform: translateY(-12px) scale(1.03);
    }

    .pack-fire {
      background: linear-gradient(160deg, #1a0a00, #3d1200, #6b2000);
      border: 2px solid rgba(255, 107, 53, 0.4);
      box-shadow: 0 8px 40px rgba(255, 107, 53, 0.2);
    }
    .pack-fire:hover { box-shadow: 0 20px 60px rgba(255, 107, 53, 0.5); }

    .pack-water {
      background: linear-gradient(160deg, #000a1a, #001233, #002266);
      border: 2px solid rgba(59, 130, 246, 0.4);
      box-shadow: 0 8px 40px rgba(59, 130, 246, 0.2);
    }
    .pack-water:hover { box-shadow: 0 20px 60px rgba(59, 130, 246, 0.5); }

    .pack-grass {
      background: linear-gradient(160deg, #001a0a, #003d12, #006b20);
      border: 2px solid rgba(34, 197, 94, 0.4);
      box-shadow: 0 8px 40px rgba(34, 197, 94, 0.2);
    }
    .pack-grass:hover { box-shadow: 0 20px 60px rgba(34, 197, 94, 0.5); }

    .pack-emoji { font-size: 4rem; filter: drop-shadow(0 0 20px rgba(255,255,255,0.3)); }
    .pack-name {
      font-family: 'Orbitron', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .pack-fire .pack-name { color: var(--fire); }
    .pack-water .pack-name { color: var(--water); }
    .pack-grass .pack-name { color: var(--grass); }

    .pack-desc {
      font-size: 0.7rem;
      color: var(--text-dim);
      padding: 0 16px;
    }

    .pack-price {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--gold);
      margin-top: 4px;
    }

    /* === OPENING ANIMATION === */
    .opening-scene {
      position: relative;
      width: 280px;
      height: 400px;
      margin: 0 auto;
    }

    .opening-pack {
      width: 280px;
      height: 400px;
      border-radius: 20px;
      position: absolute;
      top: 0;
      left: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 5rem;
      overflow: hidden;
    }

    .opening-pack::after {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      width: 4px;
      height: 100%;
      background: white;
      transform: translateX(-50%) scaleY(0);
      box-shadow: 0 0 30px white, 0 0 60px white;
      z-index: 2;
    }

    .phase-shake {
      animation: packShake 0.15s ease-in-out infinite;
    }

    @keyframes packShake {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(-2deg); }
      75% { transform: rotate(2deg); }
    }

    .phase-tear::after {
      animation: tearLine 1.5s ease-out forwards;
    }

    @keyframes tearLine {
      0% { transform: translateX(-50%) scaleY(0); opacity: 0; }
      50% { transform: translateX(-50%) scaleY(1); opacity: 1; }
      100% { transform: translateX(-50%) scaleY(1); opacity: 1; width: 20px; }
    }

    .pack-half-left, .pack-half-right {
      position: absolute;
      top: 0;
      width: 50%;
      height: 100%;
      transition: transform 1s ease-in;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border-radius: 20px;
    }

    .pack-half-left { left: 0; border-radius: 20px 0 0 20px; }
    .pack-half-right { right: 0; border-radius: 0 20px 20px 0; }

    .torn .pack-half-left { transform: translateX(-120%) rotate(-15deg); opacity: 0; }
    .torn .pack-half-right { transform: translateX(120%) rotate(15deg); opacity: 0; }

    .light-burst {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      z-index: 3;
      pointer-events: none;
    }

    .light-burst.active {
      animation: burstExpand 1.2s ease-out forwards;
    }

    @keyframes burstExpand {
      0% { width: 0; height: 0; opacity: 1; }
      60% { width: 500px; height: 500px; opacity: 0.8; }
      100% { width: 800px; height: 800px; opacity: 0; }
    }

    .light-burst-common { background: radial-gradient(circle, rgba(200,200,200,0.6), transparent); }
    .light-burst-rare { background: radial-gradient(circle, rgba(59,130,246,0.7), transparent); }
    .light-burst-ultra { background: radial-gradient(circle, rgba(168,85,247,0.7), transparent); }
    .light-burst-legendary { background: radial-gradient(circle, rgba(251,191,36,0.8), rgba(255,107,53,0.4), transparent); }

    .progress-container {
      margin-top: 30px;
      width: 280px;
      margin-left: auto;
      margin-right: auto;
    }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.1s linear;
    }

    .progress-text {
      margin-top: 10px;
      font-size: 0.8rem;
      color: var(--text-dim);
      font-family: 'Orbitron', sans-serif;
    }

    /* === CARD REVEAL === */
    .card-scene {
      perspective: 1200px;
      width: 320px;
      height: 460px;
      margin: 0 auto;
    }

    .card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.8s ease;
    }

    .card-inner.flipped {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 18px;
      overflow: hidden;
    }

    .card-back {
      background: linear-gradient(135deg, #1a1a3e, #2d1b69);
      display: flex;
      align-items: center;
      justify-content: center;
      border: 3px solid rgba(168, 85, 247, 0.5);
    }

    .card-back-pattern {
      font-size: 5rem;
      opacity: 0.4;
      animation: spin 8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .card-front {
      transform: rotateY(180deg);
      background: var(--bg-card);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
      border: 3px solid rgba(255,255,255,0.1);
    }

    .card-rarity-bar {
      width: 100%;
      height: 4px;
      border-radius: 2px;
      margin-bottom: 10px;
    }

    .rarity-common .card-rarity-bar { background: #9ca3af; }
    .rarity-rare .card-rarity-bar { background: var(--water); box-shadow: 0 0 10px var(--water); }
    .rarity-ultra .card-rarity-bar { background: var(--purple); box-shadow: 0 0 10px var(--purple); }
    .rarity-legendary .card-rarity-bar { background: var(--gold); box-shadow: 0 0 15px var(--gold); }

    .rarity-common .card-front { border-color: rgba(156, 163, 175, 0.4); }
    .rarity-rare .card-front { border-color: rgba(59, 130, 246, 0.5); box-shadow: 0 0 30px rgba(59,130,246,0.3); }
    .rarity-ultra .card-front { border-color: rgba(168, 85, 247, 0.5); box-shadow: 0 0 30px rgba(168,85,247,0.3); }
    .rarity-legendary .card-front {
      border-color: rgba(251, 191, 36, 0.6);
      box-shadow: 0 0 40px rgba(251,191,36,0.4), 0 0 80px rgba(255,107,53,0.2);
    }

    .card-image-container {
      width: 240px;
      height: 240px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 10px;
      background: rgba(0,0,0,0.2);
      border-radius: 12px;
      overflow: hidden;
    }

    .card-image-container img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
    }

    .card-name {
      font-size: 0.85rem;
      font-weight: 700;
      margin-bottom: 6px;
      text-align: center;
      line-height: 1.3;
      max-width: 100%;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .card-year {
      font-size: 0.65rem;
      color: var(--text-dim);
      margin-bottom: 8px;
      font-family: 'Orbitron', sans-serif;
    }

    .card-meta {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .grade-badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      background: rgba(251,191,36,0.15);
      color: var(--gold);
      border: 1px solid rgba(251,191,36,0.3);
    }

    .grade-badge.psa { background: rgba(220,38,38,0.15); color: #ef4444; border-color: rgba(220,38,38,0.3); }
    .grade-badge.cgc { background: rgba(34,197,94,0.15); color: var(--grass); border-color: rgba(34,197,94,0.3); }

    .price-tag {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.4rem;
      font-weight: 900;
      margin: 6px 0;
    }

    .price-tag.common { color: #9ca3af; }
    .price-tag.rare { color: var(--water); text-shadow: 0 0 10px rgba(59,130,246,0.4); }
    .price-tag.ultra { color: var(--purple); text-shadow: 0 0 10px rgba(168,85,247,0.4); }
    .price-tag.legendary { color: var(--gold); text-shadow: 0 0 15px rgba(251,191,36,0.5); }

    .rarity-label {
      margin-top: 4px;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .rarity-label-common { color: #9ca3af; }
    .rarity-label-rare { color: var(--water); text-shadow: 0 0 10px rgba(59,130,246,0.5); }
    .rarity-label-ultra { color: var(--purple); text-shadow: 0 0 10px rgba(168,85,247,0.5); }
    .rarity-label-legendary { color: var(--gold); text-shadow: 0 0 15px rgba(251,191,36,0.6); }

    /* Legendary sparkle */
    .sparkle-container {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
      border-radius: 18px;
    }

    .sparkle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: var(--gold);
      border-radius: 50%;
      box-shadow: 0 0 6px var(--gold);
      animation: sparkleFloat 2s ease-in-out infinite;
    }

    @keyframes sparkleFloat {
      0%, 100% { opacity: 0; transform: translateY(0) scale(0); }
      50% { opacity: 1; transform: translateY(-30px) scale(1); }
    }

    /* === BUTTONS === */
    .btn {
      margin-top: 24px;
      padding: 14px 40px;
      border: none;
      border-radius: 14px;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      color: white;
    }

    .btn-again {
      background: linear-gradient(135deg, var(--purple), var(--water));
      box-shadow: 0 4px 20px rgba(168,85,247,0.3);
    }

    .btn-again:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(168,85,247,0.5);
    }

    /* === COLLECTION COUNTER === */
    .counter {
      position: fixed;
      top: 20px;
      right: 20px;
      background: var(--bg-card);
      padding: 10px 18px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.08);
      font-family: 'Orbitron', sans-serif;
      font-size: 0.75rem;
      color: var(--text-dim);
      z-index: 10;
    }

    .counter span { color: var(--gold); font-weight: 700; }

    /* === LOADING === */
    .loading-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      margin-top: 80px;
    }

    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .loading-text {
      font-size: 0.85rem;
      color: var(--text-dim);
    }

    /* === BG EFFECTS === */
    .bg-glow {
      position: fixed;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      filter: blur(140px);
      opacity: 0.15;
      pointer-events: none;
      z-index: 0;
    }

    .bg-glow-1 { background: var(--purple); top: -200px; right: -200px; }
    .bg-glow-2 { background: var(--fire); bottom: -200px; left: -200px; }

    /* === CARD POOL INDICATOR === */
    .pool-info {
      font-size: 0.7rem;
      color: var(--text-dim);
      margin-bottom: 30px;
    }
    .pool-info span { color: var(--gold); font-weight: 700; }

    /* === SOURCE LINK === */
    .source-link {
      margin-top: 8px;
      font-size: 0.65rem;
    }
    .source-link a {
      color: var(--text-dim);
      text-decoration: none;
      border-bottom: 1px dotted var(--text-dim);
      transition: color 0.2s;
    }
    .source-link a:hover { color: var(--text); }

    @media (max-width: 768px) {
      h1 { font-size: 1.6rem; }
      .pack-grid { gap: 14px; }
      .pack { width: 150px; height: 230px; }
      .pack-emoji { font-size: 3rem; }
      .pack-price { font-size: 0.7rem; }
      .opening-scene { width: 240px; height: 340px; }
      .opening-pack { width: 240px; height: 340px; }
      .card-scene { width: 280px; height: 420px; }
      .card-image-container { width: 200px; height: 200px; }
      .progress-container { width: 240px; }
      .price-tag { font-size: 1.1rem; }
    }
  </style>
</head>
<body>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const PACKS = [
      { id: 'fire', emoji: '🔥', name: 'FIRE', desc: '프리미엄 팩', color: 'var(--fire)' },
      { id: 'water', emoji: '🌊', name: 'WATER', desc: '스탠다드 팩', color: 'var(--water)' },
      { id: 'grass', emoji: '🌿', name: 'GRASS', desc: '빈티지 팩', color: 'var(--grass)' },
    ];

    function getRarityFromPrice(value) {
      if (value >= 50) return 'legendary';
      if (value >= 35) return 'ultra';
      if (value >= 25) return 'rare';
      return 'common';
    }

    const RARITY_LABELS = {
      common: 'Common',
      rare: 'Rare',
      ultra: 'Ultra Rare',
      legendary: 'Legendary',
    };

    const App = () => {
      const [phase, setPhase] = useState('loading'); // loading | select | opening | reveal
      const [cards, setCards] = useState([]);
      const [dataSource, setDataSource] = useState('loading'); // loading | live | mixed | fallback
      const [selectedPack, setSelectedPack] = useState(null);
      const [currentCard, setCurrentCard] = useState(null);
      const [rarity, setRarity] = useState('common');
      const [openingPhase, setOpeningPhase] = useState(0);
      const [progress, setProgress] = useState(0);
      const [flipped, setFlipped] = useState(false);
      const [totalOpened, setTotalOpened] = useState(() => {
        try { return parseInt(localStorage.getItem('pokemon-gacha-count') || '0'); } catch { return 0; }
      });
      const timerRef = useRef(null);

      // Fallback cards in case API fails
      const FALLBACK_CARDS = [
        { id: 'fb1', name: 'Charizard VMAX Rainbow', fullName: '2020 Pokemon Sword & Shield Champion\'s Path Charizard VMAX #74', image: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/6.png', value: 55, grade: 'PSA 10', year: '2020' },
        { id: 'fb2', name: 'Pikachu Illustrator Promo', fullName: '2023 Pokemon Japanese SV Promo Pikachu', image: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png', value: 42, grade: 'CGC 10', year: '2023' },
        { id: 'fb3', name: 'Mewtwo GX Holo', fullName: '2019 Pokemon Sun & Moon Hidden Fates Mewtwo GX', image: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/150.png', value: 35, grade: 'PSA 9', year: '2019' },
        { id: 'fb4', name: 'Blastoise Base Set Holo', fullName: '1999 Pokemon Base Set Blastoise #2', image: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/9.png', value: 48, grade: 'CGC 8.5', year: '1999' },
        { id: 'fb5', name: 'Eevee Heroes Umbreon', fullName: '2021 Pokemon Japanese Eevee Heroes Umbreon VMAX', image: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/197.png', value: 38, grade: 'PSA 10', year: '2021' },
        { id: 'fb6', name: 'Rayquaza VMAX Alt Art', fullName: '2022 Pokemon Evolving Skies Rayquaza VMAX', image: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/384.png', value: 52, grade: 'CGC 9.5', year: '2022' },
        { id: 'fb7', name: 'Gengar VMAX', fullName: '2021 Pokemon Fusion Strike Gengar VMAX', image: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/94.png', value: 28, grade: 'PSA 10', year: '2021' },
        { id: 'fb8', name: 'Mew EX Holo', fullName: '2023 Pokemon Scarlet & Violet 151 Mew EX', image: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/151.png', value: 22, grade: 'CGC 10', year: '2023' },
        { id: 'fb9', name: 'Dragonite V', fullName: '2022 Pokemon Silver Tempest Dragonite V', image: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/149.png', value: 18, grade: 'PSA 9', year: '2022' },
        { id: 'fb10', name: 'Lugia V Alt Art', fullName: '2022 Pokemon Silver Tempest Lugia V', image: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/249.png', value: 60, grade: 'PSA 10', year: '2022' },
      ];

      useEffect(() => {
        let cancelled = false;
        const fetchCards = async () => {
          try {
            const res = await fetch('/api/cards');
            const data = await res.json();
            if (!cancelled && data.success && data.cards.length > 0) {
              setCards(data.cards);
              setDataSource(data.live > 0 ? 'live' : 'curated');
            } else {
              throw new Error('No cards');
            }
          } catch (e) {
            console.warn('API fallback:', e);
            if (!cancelled) {
              setCards(FALLBACK_CARDS);
              setDataSource('fallback');
            }
          }
          if (!cancelled) setPhase('select');
        };
        fetchCards();
        return () => { cancelled = true; };
      }, []);

      const pickRandomCard = () => {
        if (cards.length === 0) return FALLBACK_CARDS[0];
        return cards[Math.floor(Math.random() * cards.length)];
      };

      const openPack = (pack) => {
        setSelectedPack(pack);
        setPhase('opening');
        setOpeningPhase(0);
        setProgress(0);
        setFlipped(false);

        const card = pickRandomCard();
        const r = getRarityFromPrice(card.value);
        setCurrentCard(card);
        setRarity(r);

        let elapsed = 0;
        const totalMs = 5000;
        const interval = 50;

        timerRef.current = setInterval(() => {
          elapsed += interval;
          setProgress(Math.min((elapsed / totalMs) * 100, 100));

          if (elapsed >= 1000 && elapsed < 1050) setOpeningPhase(1);
          if (elapsed >= 3000 && elapsed < 3050) setOpeningPhase(2);
          if (elapsed >= 4200 && elapsed < 4250) setOpeningPhase(3);

          if (elapsed >= totalMs) {
            clearInterval(timerRef.current);
            setPhase('reveal');
            setTimeout(() => setFlipped(true), 300);
            setTotalOpened(prev => {
              const next = prev + 1;
              try { localStorage.setItem('pokemon-gacha-count', String(next)); } catch {}
              return next;
            });
          }
        }, interval);
      };

      const reset = () => {
        if (timerRef.current) clearInterval(timerRef.current);
        setPhase('select');
        setSelectedPack(null);
        setCurrentCard(null);
        setOpeningPhase(0);
        setProgress(0);
        setFlipped(false);
      };

      const gradeClass = (grade) => {
        if (!grade) return '';
        if (grade.startsWith('PSA')) return 'psa';
        if (grade.startsWith('CGC')) return 'cgc';
        return '';
      };

      return (
        <div className="app">
          <div className="counter">
            OPENED: <span>{totalOpened}</span>
          </div>

          <h1>POKEMON GACHA</h1>
          <p className="subtitle">팩을 선택하면 실제 포켓몬 카드가 등장합니다</p>

          <div className={`data-badge ${dataSource === 'fallback' ? 'offline' : ''}`}>
            <div className="dot"></div>
            {dataSource === 'loading' && '데이터 로딩중...'}
            {dataSource === 'live' && `LIVE · Phygitals · ${cards.length}장`}
            {dataSource === 'curated' && `Phygitals · ${cards.length}장`}
            {dataSource === 'fallback' && 'OFFLINE · 샘플 데이터'}
          </div>

          {/* === LOADING === */}
          {phase === 'loading' && (
            <div className="loading-screen">
              <div className="loading-spinner"></div>
              <div className="loading-text">카드 데이터를 불러오는 중...</div>
            </div>
          )}

          {/* === PACK SELECT === */}
          {phase === 'select' && (
            <div>
              <div className="pack-grid">
                {PACKS.map(pack => (
                  <div
                    key={pack.id}
                    className={`pack pack-${pack.id}`}
                    onClick={() => openPack(pack)}
                  >
                    <div className="pack-emoji">{pack.emoji}</div>
                    <div className="pack-name">{pack.name}</div>
                    <div className="pack-desc">{pack.desc}</div>
                    <div className="pack-price">$25.00</div>
                  </div>
                ))}
              </div>
              <div className="pool-info">
                카드 풀: <span>{cards.length}장</span> · 실제 PSA/CGC 그레이딩 카드
              </div>
            </div>
          )}

          {/* === OPENING === */}
          {phase === 'opening' && selectedPack && (
            <div>
              <div className="opening-scene">
                {openingPhase < 3 ? (
                  <div
                    className={`opening-pack pack-${selectedPack.id} ${openingPhase === 0 ? 'phase-shake' : ''} ${openingPhase >= 1 ? 'phase-tear' : ''}`}
                  >
                    {openingPhase < 2 ? (
                      <span className="pack-emoji">{selectedPack.emoji}</span>
                    ) : (
                      <React.Fragment>
                        <div className={`pack-half-left pack-${selectedPack.id} ${openingPhase >= 2 ? 'torn' : ''}`} style={{ background: 'inherit' }}></div>
                        <div className={`pack-half-right pack-${selectedPack.id} ${openingPhase >= 2 ? 'torn' : ''}`} style={{ background: 'inherit' }}></div>
                      </React.Fragment>
                    )}
                  </div>
                ) : null}

                <div className={`light-burst light-burst-${rarity} ${openingPhase >= 2 ? 'active' : ''}`}></div>
              </div>

              <div className="progress-container">
                <div className="progress-bar">
                  <div
                    className="progress-fill"
                    style={{ width: `${progress}%`, background: selectedPack.color }}
                  ></div>
                </div>
                <div className="progress-text">
                  {openingPhase === 0 && 'OPENING...'}
                  {openingPhase === 1 && 'TEARING...'}
                  {openingPhase === 2 && 'REVEALING...'}
                  {openingPhase === 3 && 'GET READY!'}
                </div>
              </div>
            </div>
          )}

          {/* === CARD REVEAL === */}
          {phase === 'reveal' && currentCard && (
            <div>
              <div className={`card-scene rarity-${rarity}`}>
                <div className={`card-inner ${flipped ? 'flipped' : ''}`}>
                  <div className="card-face card-back">
                    <div className="card-back-pattern">🎴</div>
                  </div>
                  <div className="card-face card-front">
                    <div className="card-rarity-bar"></div>
                    <div className="card-image-container">
                      <img src={currentCard.image} alt={currentCard.name} crossOrigin="anonymous" />
                    </div>
                    <div className="card-name">{currentCard.name}</div>
                    {currentCard.year && <div className="card-year">{currentCard.year}</div>}
                    <div className="card-meta">
                      {currentCard.grade && (
                        <span className={`grade-badge ${gradeClass(currentCard.grade)}`}>{currentCard.grade}</span>
                      )}
                    </div>
                    <div className={`price-tag ${rarity}`}>
                      ${currentCard.value.toFixed(2)}
                    </div>
                    <div className={`rarity-label rarity-label-${rarity}`}>
                      {RARITY_LABELS[rarity]}
                    </div>

                    {rarity === 'legendary' && (
                      <div className="sparkle-container">
                        {Array.from({ length: 12 }).map((_, i) => (
                          <div
                            key={i}
                            className="sparkle"
                            style={{
                              left: `${Math.random() * 100}%`,
                              top: `${Math.random() * 100}%`,
                              animationDelay: `${Math.random() * 2}s`,
                              animationDuration: `${1.5 + Math.random()}s`,
                            }}
                          ></div>
                        ))}
                      </div>
                    )}
                  </div>
                </div>
              </div>

              <button className="btn btn-again" onClick={reset}>
                🔄 다시 뽑기
              </button>

              <div className="source-link">
                <a href="https://www.phygitals.com" target="_blank" rel="noopener noreferrer">
                  Card data from Phygitals.com
                </a>
              </div>
            </div>
          )}
        </div>
      );
    };

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
