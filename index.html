<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phygitals · Pokemon Pack Opening</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎴</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0a;
      --bg-card: #141414;
      --bg-card-hover: #1a1a1a;
      --border: #222;
      --border-light: #333;
      --emerald: #1aa87a;
      --emerald-dim: rgba(26,168,122,0.15);
      --emerald-glow: rgba(26,168,122,0.4);
      --text: #f5f5f5;
      --text-secondary: #a0a0a0;
      --text-dim: #666;
      --common: #9ca3af;
      --uncommon: #22c55e;
      --rare: #3b82f6;
      --epic: #a855f7;
      --mythic: #f59e0b;
      --radius: 12px;
      --radius-lg: 16px;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* === NAV BAR === */
    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: rgba(10,10,10,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 100;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .nav-logo .logo-dot {
      width: 8px;
      height: 8px;
      background: var(--emerald);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--emerald-glow);
    }

    .nav-links {
      display: flex;
      gap: 8px;
    }

    .nav-link {
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }

    .nav-link:hover { color: var(--text); background: rgba(255,255,255,0.05); }
    .nav-link.active { color: var(--emerald); background: var(--emerald-dim); }

    .nav-counter {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 20px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-secondary);
    }

    .nav-counter span { color: var(--emerald); }

    /* === MAIN CONTENT === */
    .app {
      max-width: 960px;
      margin: 0 auto;
      padding: 80px 24px 40px;
      min-height: 100vh;
    }

    /* === HERO === */
    .hero {
      text-align: center;
      padding: 40px 0 20px;
    }

    .hero h1 {
      font-size: 2.8rem;
      font-weight: 900;
      letter-spacing: -1.5px;
      line-height: 1.1;
      margin-bottom: 12px;
    }

    .hero h1 .accent { color: var(--emerald); }

    .hero-sub {
      color: var(--text-secondary);
      font-size: 1rem;
      font-weight: 400;
      margin-bottom: 16px;
    }

    .hero-stats {
      display: flex;
      justify-content: center;
      gap: 32px;
      margin-bottom: 10px;
    }

    .hero-stat {
      text-align: center;
    }

    .hero-stat-value {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--text);
    }

    .hero-stat-label {
      font-size: 0.7rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 2px;
    }

    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 600;
      background: var(--emerald-dim);
      color: var(--emerald);
      border: 1px solid rgba(26,168,122,0.25);
      margin-bottom: 30px;
    }

    .live-badge .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--emerald);
      animation: pulse 2s infinite;
    }

    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* === PACK GRID === */
    .section-title {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 16px;
    }

    .pack-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 48px;
    }

    .pack {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
      cursor: pointer;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
      text-align: center;
    }

    .pack:hover {
      border-color: var(--emerald);
      background: var(--bg-card-hover);
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(26,168,122,0.12);
    }

    .pack::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--emerald);
      opacity: 0;
      transition: opacity 0.25s;
    }

    .pack:hover::before { opacity: 1; }

    .pack-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 16px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.4rem;
    }

    .pack-icon.fire { background: linear-gradient(135deg, #2d1200, #4a1e00); }
    .pack-icon.water { background: linear-gradient(135deg, #001233, #002266); }
    .pack-icon.grass { background: linear-gradient(135deg, #002d12, #004a1e); }

    .pack-name {
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .pack-desc {
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-bottom: 12px;
    }

    .pack-price {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 6px 16px;
      border-radius: 8px;
      background: var(--emerald-dim);
      color: var(--emerald);
      font-size: 0.85rem;
      font-weight: 700;
    }

    .pack-rarity {
      margin-top: 12px;
      display: flex;
      justify-content: center;
      gap: 6px;
    }

    .rarity-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    /* === OPENING ANIMATION === */
    .opening-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 0;
    }

    .opening-scene {
      position: relative;
      width: 260px;
      height: 380px;
      margin: 0 auto 24px;
    }

    .opening-pack {
      width: 260px;
      height: 380px;
      border-radius: var(--radius-lg);
      position: absolute;
      top: 0;
      left: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4.5rem;
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .opening-pack::after {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      width: 3px;
      height: 100%;
      background: var(--emerald);
      transform: translateX(-50%) scaleY(0);
      box-shadow: 0 0 20px var(--emerald), 0 0 40px var(--emerald);
      z-index: 2;
    }

    .phase-shake { animation: packShake 0.12s ease-in-out infinite; }

    @keyframes packShake {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(-1.5deg); }
      75% { transform: rotate(1.5deg); }
    }

    .phase-tear::after { animation: tearLine 1.5s ease-out forwards; }

    @keyframes tearLine {
      0% { transform: translateX(-50%) scaleY(0); opacity: 0; }
      50% { transform: translateX(-50%) scaleY(1); opacity: 1; }
      100% { transform: translateX(-50%) scaleY(1); opacity: 1; width: 16px; }
    }

    .pack-half-left, .pack-half-right {
      position: absolute;
      top: 0;
      width: 50%;
      height: 100%;
      transition: transform 1s ease-in;
      overflow: hidden;
    }

    .pack-half-left { left: 0; border-radius: var(--radius-lg) 0 0 var(--radius-lg); }
    .pack-half-right { right: 0; border-radius: 0 var(--radius-lg) var(--radius-lg) 0; }

    .torn .pack-half-left { transform: translateX(-120%) rotate(-15deg); opacity: 0; }
    .torn .pack-half-right { transform: translateX(120%) rotate(15deg); opacity: 0; }

    .light-burst {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      z-index: 3;
      pointer-events: none;
    }

    .light-burst.active { animation: burstExpand 1.2s ease-out forwards; }

    @keyframes burstExpand {
      0% { width: 0; height: 0; opacity: 1; }
      60% { width: 500px; height: 500px; opacity: 0.7; }
      100% { width: 800px; height: 800px; opacity: 0; }
    }

    .light-burst-common { background: radial-gradient(circle, rgba(156,163,175,0.5), transparent); }
    .light-burst-uncommon { background: radial-gradient(circle, rgba(34,197,94,0.6), transparent); }
    .light-burst-rare { background: radial-gradient(circle, rgba(59,130,246,0.6), transparent); }
    .light-burst-epic { background: radial-gradient(circle, rgba(168,85,247,0.6), transparent); }
    .light-burst-mythic { background: radial-gradient(circle, rgba(245,158,11,0.7), rgba(255,100,50,0.3), transparent); }

    .progress-container {
      width: 260px;
    }

    .progress-bar {
      width: 100%;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 2px;
      background: var(--emerald);
      transition: width 0.1s linear;
    }

    .progress-text {
      margin-top: 12px;
      font-size: 0.75rem;
      color: var(--text-dim);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-align: center;
    }

    /* === CARD REVEAL === */
    .reveal-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 0;
    }

    .card-scene {
      perspective: 1200px;
      width: 320px;
      height: 450px;
      margin-bottom: 20px;
    }

    .card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .card-inner.flipped { transform: rotateY(180deg); }

    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    .card-back {
      background: var(--bg-card);
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }

    .card-back-logo {
      font-size: 3rem;
      opacity: 0.3;
      animation: floatSpin 6s linear infinite;
    }

    @keyframes floatSpin {
      0% { transform: rotate(0deg) scale(1); }
      50% { transform: rotate(180deg) scale(1.1); }
      100% { transform: rotate(360deg) scale(1); }
    }

    .card-back-text {
      font-size: 0.7rem;
      color: var(--text-dim);
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .card-front {
      transform: rotateY(180deg);
      background: var(--bg-card);
      display: flex;
      flex-direction: column;
      border: 1px solid var(--border);
    }

    .card-top-bar {
      height: 4px;
      width: 100%;
      flex-shrink: 0;
    }

    .rarity-common .card-top-bar { background: var(--common); }
    .rarity-uncommon .card-top-bar { background: var(--uncommon); }
    .rarity-rare .card-top-bar { background: var(--rare); }
    .rarity-epic .card-top-bar { background: var(--epic); }
    .rarity-mythic .card-top-bar { background: var(--mythic); }

    .rarity-rare .card-front { border-color: rgba(59,130,246,0.3); box-shadow: 0 0 30px rgba(59,130,246,0.15); }
    .rarity-epic .card-front { border-color: rgba(168,85,247,0.3); box-shadow: 0 0 30px rgba(168,85,247,0.15); }
    .rarity-mythic .card-front { border-color: rgba(245,158,11,0.3); box-shadow: 0 0 40px rgba(245,158,11,0.2); }

    .card-image-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      background: #0d0d0d;
      position: relative;
      min-height: 0;
    }

    .card-image-area img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 8px;
    }

    .card-info {
      padding: 14px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .card-info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .card-title {
      font-size: 0.85rem;
      font-weight: 700;
      line-height: 1.3;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .card-year-text {
      font-size: 0.65rem;
      color: var(--text-dim);
      font-weight: 500;
    }

    .card-bottom-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .grade-badge {
      padding: 3px 10px;
      border-radius: 6px;
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .grade-badge.psa { background: rgba(220,38,38,0.12); color: #ef4444; }
    .grade-badge.cgc { background: rgba(34,197,94,0.12); color: #22c55e; }
    .grade-badge.default { background: rgba(255,255,255,0.06); color: var(--text-secondary); }

    .card-price {
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--emerald);
    }

    .rarity-tag {
      display: inline-flex;
      padding: 3px 10px;
      border-radius: 6px;
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .rarity-tag.common { background: rgba(156,163,175,0.1); color: var(--common); }
    .rarity-tag.uncommon { background: rgba(34,197,94,0.1); color: var(--uncommon); }
    .rarity-tag.rare { background: rgba(59,130,246,0.1); color: var(--rare); }
    .rarity-tag.epic { background: rgba(168,85,247,0.1); color: var(--epic); }
    .rarity-tag.mythic { background: rgba(245,158,11,0.12); color: var(--mythic); }

    /* Mythic sparkle */
    .sparkle-container {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      overflow: hidden;
      border-radius: var(--radius-lg);
    }

    .sparkle {
      position: absolute;
      width: 3px; height: 3px;
      background: var(--mythic);
      border-radius: 50%;
      box-shadow: 0 0 6px var(--mythic);
      animation: sparkleFloat 2s ease-in-out infinite;
    }

    @keyframes sparkleFloat {
      0%, 100% { opacity: 0; transform: translateY(0) scale(0); }
      50% { opacity: 1; transform: translateY(-20px) scale(1); }
    }

    /* === BUTTONS === */
    .btn {
      padding: 12px 32px;
      border: none;
      border-radius: var(--radius);
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      color: white;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background: var(--emerald);
      box-shadow: 0 4px 16px rgba(26,168,122,0.25);
    }

    .btn-primary:hover {
      background: #1fc08d;
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(26,168,122,0.35);
    }

    .btn-secondary {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-secondary);
    }

    .btn-secondary:hover {
      border-color: var(--border-light);
      color: var(--text);
    }

    .btn-group {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }

    /* === BUYBACK INFO === */
    .buyback-info {
      margin-top: 12px;
      padding: 10px 16px;
      border-radius: var(--radius);
      background: rgba(26,168,122,0.06);
      border: 1px solid rgba(26,168,122,0.15);
      font-size: 0.75rem;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .buyback-info strong { color: var(--emerald); }

    /* === RECENT PULLS (horizontal scroll) === */
    .recent-section {
      margin-top: 40px;
    }

    .recent-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .recent-scroll {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding-bottom: 8px;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
    }

    .recent-scroll::-webkit-scrollbar { height: 4px; }
    .recent-scroll::-webkit-scrollbar-track { background: transparent; }
    .recent-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .recent-card {
      flex-shrink: 0;
      width: 160px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      scroll-snap-align: start;
      transition: border-color 0.2s;
    }

    .recent-card:hover { border-color: var(--border-light); }

    .recent-card-img {
      width: 100%;
      height: 140px;
      object-fit: cover;
      background: #0d0d0d;
    }

    .recent-card-info {
      padding: 8px 10px;
    }

    .recent-card-name {
      font-size: 0.7rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }

    .recent-card-price {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--emerald);
    }

    /* === LOADING === */
    .loading-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 80px 0;
    }

    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--emerald);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-size: 0.8rem;
      color: var(--text-dim);
    }

    /* === FOOTER === */
    .footer {
      margin-top: 60px;
      padding: 24px 0;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.7rem;
      color: var(--text-dim);
    }

    .footer a {
      color: var(--text-secondary);
      text-decoration: none;
    }

    .footer a:hover { color: var(--emerald); }

    /* === RESPONSIVE === */
    @media (max-width: 768px) {
      .hero h1 { font-size: 1.8rem; }
      .pack-grid { grid-template-columns: 1fr; max-width: 360px; margin-left: auto; margin-right: auto; }
      .pack-icon { width: 60px; height: 60px; font-size: 1.8rem; border-radius: 12px; }
      .opening-scene { width: 220px; height: 320px; }
      .opening-pack { width: 220px; height: 320px; }
      .card-scene { width: 280px; height: 400px; }
      .progress-container { width: 220px; }
      .hero-stats { gap: 20px; }
      .nav-links { display: none; }
      .recent-card { width: 140px; }
      .recent-card-img { height: 120px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const PACKS = [
      { id: 'fire', emoji: '🔥', name: 'Fire Pack', desc: '프리미엄 홀로 카드 확률 UP', price: 25 },
      { id: 'water', emoji: '🌊', name: 'Water Pack', desc: '빈티지 & 프로모 확률 UP', price: 25 },
      { id: 'grass', emoji: '🌿', name: 'Grass Pack', desc: 'Full Art 확률 UP', price: 25 },
    ];

    const RARITY_TIERS = [
      { key: 'common',   label: 'Common',   color: '#9ca3af', min: 0,   max: 15 },
      { key: 'uncommon', label: 'Uncommon', color: '#22c55e', min: 15,  max: 25 },
      { key: 'rare',     label: 'Rare',     color: '#3b82f6', min: 25,  max: 40 },
      { key: 'epic',     label: 'Epic',     color: '#a855f7', min: 40,  max: 60 },
      { key: 'mythic',   label: 'Mythic',   color: '#f59e0b', min: 60,  max: Infinity },
    ];

    function getRarityFromPrice(value) {
      for (let i = RARITY_TIERS.length - 1; i >= 0; i--) {
        if (value >= RARITY_TIERS[i].min) return RARITY_TIERS[i].key;
      }
      return 'common';
    }

    function getRarityLabel(key) {
      return RARITY_TIERS.find(r => r.key === key)?.label || 'Common';
    }

    // Client-side fallback cards
    const FALLBACK_CARDS = [
      { id: 'fb1', name: 'Charizard G Lv.X 1st Ed #2', fullName: '2009 Pokemon Charizard Half-Deck Japanese 1st Edition Charizard G Lv.X #2 PSA 9', image: 'https://gateway.irys.xyz/B7M1HLjQ5rEQJM68h9myzKYtbcsmmFp5LQ386kv3sWgD', value: 179.62, grade: 'PSA 9', year: '2009' },
      { id: 'fb2', name: 'Base Set Japanese Raichu #26', fullName: '1996 Pokemon Base Set Japanese Holo Raichu #26 CGC 8.5', image: 'https://gateway.irys.xyz/5xS75GZf6jMeT1R8zriqQJwMekPaFDVdKpT1yhEBCDhb', value: 53.31, grade: 'CGC 8.5', year: '1996' },
      { id: 'fb3', name: 'Crown Zenith Pikachu #160', fullName: '2023 Pokemon Crown Zenith Pikachu #160 PSA 9', image: 'https://gateway.irys.xyz/3NQ8BHsx8QNiXucj78id6DRnzaxonFBjsy37HoR4DX4E', value: 43.09, grade: 'PSA 9', year: '2023' },
      { id: 'fb4', name: 'SV Promo Pikachu #242', fullName: '2025 Pokemon Japanese SV Promo Pikachu #242 CGC 10', image: 'https://gateway.irys.xyz/7BAnfkY5E7w3b4mbY7u8s9JZs3djD5hEJMm12meMkJu7', value: 34.23, grade: 'CGC 10', year: '2025' },
      { id: 'fb5', name: 'Hidden Fates Frogadier #SV12', fullName: '2019 Pokemon Hidden Fates Frogadier #SV12 PSA 10', image: 'https://gateway.irys.xyz/9hL8XXLkXYFhrHnSgAyYFiwMi9o4RDsi1ANMtCqKNQDv', value: 28.23, grade: 'PSA 10', year: '2019' },
    ];

    const App = () => {
      const [phase, setPhase] = useState('loading');
      const [cards, setCards] = useState([]);
      const [dataSource, setDataSource] = useState('loading');
      const [selectedPack, setSelectedPack] = useState(null);
      const [currentCard, setCurrentCard] = useState(null);
      const [rarity, setRarity] = useState('common');
      const [openingPhase, setOpeningPhase] = useState(0);
      const [progress, setProgress] = useState(0);
      const [flipped, setFlipped] = useState(false);
      const [history, setHistory] = useState([]);
      const [totalOpened, setTotalOpened] = useState(() => {
        try { return parseInt(localStorage.getItem('pokemon-gacha-count') || '0'); } catch { return 0; }
      });
      const timerRef = useRef(null);

      useEffect(() => {
        // Load history from localStorage
        try {
          const saved = JSON.parse(localStorage.getItem('pokemon-gacha-history') || '[]');
          setHistory(saved.slice(0, 20));
        } catch {}
      }, []);

      useEffect(() => {
        let cancelled = false;
        const fetchCards = async () => {
          try {
            const res = await fetch('/api/cards');
            const data = await res.json();
            if (!cancelled && data.success && data.cards.length > 0) {
              setCards(data.cards);
              setDataSource(data.live > 0 ? 'live' : 'curated');
            } else {
              throw new Error('No cards');
            }
          } catch (e) {
            if (!cancelled) {
              setCards(FALLBACK_CARDS);
              setDataSource('fallback');
            }
          }
          if (!cancelled) setPhase('select');
        };
        fetchCards();
        return () => { cancelled = true; };
      }, []);

      const openPack = (pack) => {
        setSelectedPack(pack);
        setPhase('opening');
        setOpeningPhase(0);
        setProgress(0);
        setFlipped(false);

        const card = cards[Math.floor(Math.random() * cards.length)];
        const r = getRarityFromPrice(card.value);
        setCurrentCard(card);
        setRarity(r);

        let elapsed = 0;
        const totalMs = 5000;
        const interval = 50;

        timerRef.current = setInterval(() => {
          elapsed += interval;
          setProgress(Math.min((elapsed / totalMs) * 100, 100));

          if (elapsed >= 1000 && elapsed < 1050) setOpeningPhase(1);
          if (elapsed >= 3000 && elapsed < 3050) setOpeningPhase(2);
          if (elapsed >= 4200 && elapsed < 4250) setOpeningPhase(3);

          if (elapsed >= totalMs) {
            clearInterval(timerRef.current);
            setPhase('reveal');
            setTimeout(() => setFlipped(true), 300);
            setTotalOpened(prev => {
              const next = prev + 1;
              try { localStorage.setItem('pokemon-gacha-count', String(next)); } catch {}
              return next;
            });
          }
        }, interval);
      };

      const saveToHistory = (card, rar) => {
        const entry = { ...card, rarity: rar, openedAt: Date.now() };
        setHistory(prev => {
          const next = [entry, ...prev].slice(0, 20);
          try { localStorage.setItem('pokemon-gacha-history', JSON.stringify(next)); } catch {}
          return next;
        });
      };

      useEffect(() => {
        if (phase === 'reveal' && currentCard && flipped) {
          saveToHistory(currentCard, rarity);
        }
      }, [flipped]);

      const reset = () => {
        if (timerRef.current) clearInterval(timerRef.current);
        setPhase('select');
        setSelectedPack(null);
        setCurrentCard(null);
        setOpeningPhase(0);
        setProgress(0);
        setFlipped(false);
      };

      const gradeClass = (grade) => {
        if (!grade) return 'default';
        if (grade.startsWith('PSA')) return 'psa';
        if (grade.startsWith('CGC')) return 'cgc';
        return 'default';
      };

      const totalValue = history.reduce((sum, c) => sum + (c.value || 0), 0);

      return (
        <React.Fragment>
          {/* NAV */}
          <nav className="nav">
            <div className="nav-logo">
              <div className="logo-dot"></div>
              Phygitals
            </div>
            <div className="nav-links">
              <a className="nav-link active" href="#">Packs</a>
              <a className="nav-link" href="https://www.phygitals.com/marketplace" target="_blank" rel="noopener noreferrer">Marketplace</a>
              <a className="nav-link" href="https://www.phygitals.com" target="_blank" rel="noopener noreferrer">Explore</a>
            </div>
            <div className="nav-counter">
              Opened: <span>{totalOpened}</span>
            </div>
          </nav>

          <div className="app">
            {/* === LOADING === */}
            {phase === 'loading' && (
              <div className="loading-screen">
                <div className="loading-spinner"></div>
                <div className="loading-text">Loading card pool...</div>
              </div>
            )}

            {/* === PACK SELECT === */}
            {phase === 'select' && (
              <React.Fragment>
                <div className="hero">
                  <h1>Open a <span className="accent">Pack</span></h1>
                  <p className="hero-sub">
                    Open a digital pack to instantly reveal a real, graded card.
                  </p>
                  <div className="hero-stats">
                    <div className="hero-stat">
                      <div className="hero-stat-value">{cards.length}</div>
                      <div className="hero-stat-label">Cards in Pool</div>
                    </div>
                    <div className="hero-stat">
                      <div className="hero-stat-value">{totalOpened}</div>
                      <div className="hero-stat-label">Packs Opened</div>
                    </div>
                    <div className="hero-stat">
                      <div className="hero-stat-value">${totalValue.toFixed(0)}</div>
                      <div className="hero-stat-label">Total Value</div>
                    </div>
                  </div>
                  <div className="live-badge">
                    <div className="dot"></div>
                    {dataSource === 'live' ? 'LIVE' : dataSource === 'curated' ? 'Phygitals Data' : 'Offline'}
                    {' · '}{cards.length} cards
                  </div>
                </div>

                <div className="section-title">Choose a Pack</div>
                <div className="pack-grid">
                  {PACKS.map(pack => (
                    <div key={pack.id} className="pack" onClick={() => openPack(pack)}>
                      <div className={`pack-icon ${pack.id}`}>{pack.emoji}</div>
                      <div className="pack-name">{pack.name}</div>
                      <div className="pack-desc">{pack.desc}</div>
                      <div className="pack-price">${pack.price}.00</div>
                      <div className="pack-rarity">
                        {RARITY_TIERS.map(r => (
                          <div key={r.key} className="rarity-dot" style={{ background: r.color }} title={r.label}></div>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>

                {/* Recent Pulls */}
                {history.length > 0 && (
                  <div className="recent-section">
                    <div className="recent-header">
                      <div className="section-title">Recent Pulls</div>
                    </div>
                    <div className="recent-scroll">
                      {history.map((card, i) => (
                        <div key={`${card.id}-${i}`} className="recent-card">
                          <img className="recent-card-img" src={card.image} alt={card.name} loading="lazy" />
                          <div className="recent-card-info">
                            <div className="recent-card-name">{card.name}</div>
                            <div className="recent-card-price">${card.value?.toFixed(2)}</div>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                <div className="footer">
                  <span>Card data from <a href="https://www.phygitals.com" target="_blank" rel="noopener noreferrer">Phygitals.com</a></span>
                  <span>PSA / CGC Graded Cards</span>
                </div>
              </React.Fragment>
            )}

            {/* === OPENING === */}
            {phase === 'opening' && selectedPack && (
              <div className="opening-container">
                <div className="opening-scene">
                  {openingPhase < 3 ? (
                    <div
                      className={`opening-pack ${openingPhase === 0 ? 'phase-shake' : ''} ${openingPhase >= 1 ? 'phase-tear' : ''}`}
                      style={{ background: 'var(--bg-card)' }}
                    >
                      {openingPhase < 2 ? (
                        <span>{selectedPack.emoji}</span>
                      ) : (
                        <React.Fragment>
                          <div className={`pack-half-left ${openingPhase >= 2 ? 'torn' : ''}`} style={{ background: 'var(--bg-card)' }}></div>
                          <div className={`pack-half-right ${openingPhase >= 2 ? 'torn' : ''}`} style={{ background: 'var(--bg-card)' }}></div>
                        </React.Fragment>
                      )}
                    </div>
                  ) : null}
                  <div className={`light-burst light-burst-${rarity} ${openingPhase >= 2 ? 'active' : ''}`}></div>
                </div>

                <div className="progress-container">
                  <div className="progress-bar">
                    <div className="progress-fill" style={{ width: `${progress}%` }}></div>
                  </div>
                  <div className="progress-text">
                    {openingPhase === 0 && 'Opening...'}
                    {openingPhase === 1 && 'Tearing...'}
                    {openingPhase === 2 && 'Revealing...'}
                    {openingPhase === 3 && 'Get ready!'}
                  </div>
                </div>
              </div>
            )}

            {/* === CARD REVEAL === */}
            {phase === 'reveal' && currentCard && (
              <div className="reveal-container">
                <div className={`card-scene rarity-${rarity}`}>
                  <div className={`card-inner ${flipped ? 'flipped' : ''}`}>
                    <div className="card-face card-back">
                      <div className="card-back-logo">🎴</div>
                      <div className="card-back-text">Phygitals</div>
                    </div>
                    <div className="card-face card-front">
                      <div className="card-top-bar"></div>
                      <div className="card-image-area">
                        <img src={currentCard.image} alt={currentCard.name} />
                      </div>
                      <div className="card-info">
                        <div className="card-info-row">
                          <div className="card-title">{currentCard.name}</div>
                          {currentCard.year && <div className="card-year-text">{currentCard.year}</div>}
                        </div>
                        <div className="card-bottom-row">
                          <div style={{ display: 'flex', gap: '6px', alignItems: 'center' }}>
                            {currentCard.grade && (
                              <span className={`grade-badge ${gradeClass(currentCard.grade)}`}>{currentCard.grade}</span>
                            )}
                            <span className={`rarity-tag ${rarity}`}>{getRarityLabel(rarity)}</span>
                          </div>
                          <div className="card-price">${currentCard.value.toFixed(2)}</div>
                        </div>
                      </div>

                      {rarity === 'mythic' && (
                        <div className="sparkle-container">
                          {Array.from({ length: 12 }).map((_, i) => (
                            <div key={i} className="sparkle" style={{
                              left: `${Math.random() * 100}%`,
                              top: `${Math.random() * 100}%`,
                              animationDelay: `${Math.random() * 2}s`,
                              animationDuration: `${1.5 + Math.random()}s`,
                            }}></div>
                          ))}
                        </div>
                      )}
                    </div>
                  </div>
                </div>

                <div className="buyback-info">
                  💡 Sell back at <strong>85% value · ${(currentCard.value * 0.85).toFixed(2)}</strong>
                </div>

                <div className="btn-group">
                  <button className="btn btn-primary" onClick={reset}>Open Another</button>
                  <button className="btn btn-secondary" onClick={reset}>Back to Packs</button>
                </div>
              </div>
            )}
          </div>
        </React.Fragment>
      );
    };

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
